<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>기상할증 알리미</title>
<meta name="theme-color" content="#12161E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="기상할증">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B0F14;color:#E2E8F0;min-height:100vh;min-height:100dvh}

/* ── 권역 선택 ── */
#screen-select{display:none;padding:32px 24px}
.select-title{font-size:22px;font-weight:500;margin-bottom:8px}
.select-sub{font-size:14px;color:#4A5568;margin-bottom:32px}
.team-label{font-size:11px;color:#4A5568;font-weight:500;margin:20px 0 10px}
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r-btn{background:#141921;border:1px solid #1E2A38;border-radius:12px;padding:16px;text-align:left;cursor:pointer}
.r-btn:active{background:#1E2A38}
.r-btn-name{font-size:15px;font-weight:500;color:#E2E8F0}
.r-btn-team{font-size:11px;color:#4A5568;margin-top:3px}

/* ── 메인 위젯 ── */
#screen-main{display:none;min-height:100vh;min-height:100dvh;display:none;flex-direction:column}
.main-inner{flex:1;display:flex;flex-direction:column;padding:24px 24px 40px}

.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.region-chip{font-size:15px;font-weight:500;color:#E2E8F0}
.change-btn{font-size:11px;color:#4A5568;background:none;border:1px solid #1E2A38;border-radius:8px;padding:5px 10px;cursor:pointer}

/* 핵심 상태 카드 */
.status-card{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;padding:40px 24px;margin-bottom:20px;border:1px solid transparent;text-align:center}
.status-card.on{background:#1A0F05;border-color:rgba(249,115,22,.3)}
.status-card.off{background:#0A2A1A;border-color:rgba(5,205,130,.2)}
.status-card.loading{background:#141921;border-color:#1E2A38}

.status-icon{font-size:56px;margin-bottom:16px;line-height:1}
.status-main{font-size:26px;font-weight:500;margin-bottom:8px}
.status-card.on .status-main{color:#F97316}
.status-card.off .status-main{color:#05CD82}
.status-card.loading .status-main{color:#4A5568}
.status-sub{font-size:15px;opacity:.8}
.status-card.on .status-sub{color:#F97316}
.status-card.off .status-sub{color:#05CD82}
.status-card.loading .status-sub{color:#4A5568}

.status-changed{font-size:12px;margin-top:16px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.06);color:#64748B}

/* 날씨 수치 */
.weather-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1E2A38;border-radius:14px;overflow:hidden;margin-bottom:16px}
.wnum{background:#141921;padding:14px 10px;text-align:center}
.wnum-val{font-size:18px;font-weight:500}
.wnum-label{font-size:10px;color:#4A5568;margin-top:3px}

/* 링크 버튼 */
.link-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.link-btn{padding:13px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid transparent;text-align:center}
.link-btn.cctv{background:#0A1A2A;border-color:rgba(96,165,250,.25);color:#60A5FA}
.link-btn.radar{background:#0A2A1A;border-color:rgba(5,205,130,.2);color:#05CD82}

/* 알림 배너 */
.notif-banner{background:#141921;border:1px solid #1E2A38;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.notif-text{font-size:12px;color:#64748B;flex:1}
.notif-btn{font-size:12px;color:#60A5FA;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;font-family:inherit}

.footer-text{font-size:11px;color:#2A3545;text-align:center}

/* 로딩 */
#screen-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.loading-icon{font-size:48px}
.loading-text{font-size:14px;color:#4A5568}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>

<div id="screen-loading">
  <div class="loading-icon pulsing">🌧</div>
  <div class="loading-text">불러오는 중...</div>
</div>

<!-- 권역 선택 -->
<div id="screen-select">
  <div class="select-title">담당 권역 선택</div>
  <div class="select-sub">한 번만 선택하면 바로 알림을 받을 수 있어요</div>
  <div id="region-list"></div>
</div>

<!-- 메인 위젯 -->
<div id="screen-main">
  <div class="main-inner">

    <div class="top-row">
      <div class="region-chip" id="m-region">--</div>
      <button class="change-btn" onclick="changeRegion()">권역 변경</button>
    </div>

    <div class="status-card loading" id="status-card">
      <div class="status-icon" id="status-icon">🌥</div>
      <div class="status-main" id="status-main">날씨 확인 중...</div>
      <div class="status-sub" id="status-sub">잠시만 기다려 주세요</div>
      <div class="status-changed" id="status-changed" style="display:none"></div>
    </div>

    <div class="weather-nums">
      <div class="wnum"><div class="wnum-val" id="n-temp">--°</div><div class="wnum-label">기온</div></div>
      <div class="wnum"><div class="wnum-val" id="n-precip">--</div><div class="wnum-label">강수량</div></div>
      <div class="wnum"><div class="wnum-val" id="n-humid">--%</div><div class="wnum-label">습도</div></div>
    </div>

    <div class="notif-banner" id="notif-banner" style="display:none">
      <div class="notif-text">비가 오면 자동으로 알림을 받을 수 있어요</div>
      <button class="notif-btn" onclick="requestNotif()">알림 켜기</button>
    </div>

    <div class="link-row">
      <button class="link-btn cctv" onclick="window.open('https://its.go.kr/map/cctv','_blank')">📹 CCTV 지도</button>
      <button class="link-btn radar" onclick="window.open('https://www.weather.go.kr/w/image/radar.do','_blank')">🌧 레이더 지도</button>
    </div>

    <div class="footer-text" id="m-footer">기상청 초단기실황 · 10분 자동 갱신</div>
  </div>
</div>

<script>
const REGIONS = {
  '강남동부': {nx:61,ny:126,team:'LX1'},
  '강남서부': {nx:59,ny:125,team:'LX1'},
  '강북동부': {nx:61,ny:128,team:'LX1'},
  '강북서부': {nx:58,ny:128,team:'LX1'},
  '경기서부': {nx:54,ny:124,team:'LX2'},
  '경기남부': {nx:60,ny:121,team:'LX2'},
  '경기북부': {nx:57,ny:130,team:'LX2'},
  '강원충북': {nx:69,ny:107,team:'LX3'},
  '대전충남': {nx:67,ny:100,team:'LX3'},
  '광주전라': {nx:58,ny:74, team:'LX3'},
  '부경동부': {nx:98,ny:76, team:'LX4'},
  '부경서부': {nx:90,ny:77, team:'LX4'},
  '대구경북': {nx:89,ny:91, team:'LX4'},
};
const TEAM_NAMES = {LX1:'LX1팀 — 서울',LX2:'LX2팀 — 경기',LX3:'LX3팀 — 강원·충청·전라',LX4:'LX4팀 — 부산·경남·대구'};
const PTY_LABEL  = {0:'없음',1:'비',2:'비/눈',3:'눈',5:'빗방울',6:'빗방울·눈날림',7:'눈날림'};
const RAIN_PTY   = new Set([1,2,5,6,3,7]);

let currentRegion = null;
let lastSurcharge = null;
let lastChangeTime = null;
let refreshTimer   = null;

function show(id){
  ['screen-loading','screen-select','screen-main']
    .forEach(s => document.getElementById(s).style.display = s===id ? (s==='screen-main'?'flex':'block') : 'none');
}

function buildRegionList(){
  const teams = {};
  Object.entries(REGIONS).forEach(([name,{team}]) => { if(!teams[team]) teams[team]=[]; teams[team].push(name); });
  const el = document.getElementById('region-list');
  el.innerHTML = '';
  Object.entries(teams).forEach(([team, parts]) => {
    const label = document.createElement('div');
    label.className = 'team-label';
    label.textContent = TEAM_NAMES[team];
    el.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'region-grid';
    parts.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'r-btn';
      btn.innerHTML = `<div class="r-btn-name">${name}</div><div class="r-btn-team">${team}</div>`;
      btn.onclick = () => selectRegion(name);
      grid.appendChild(btn);
    });
    el.appendChild(grid);
  });
}

function selectRegion(name){
  localStorage.setItem('vroong_region', name);
  currentRegion = name;
  lastSurcharge = null;
  document.getElementById('m-region').textContent = name;
  show('screen-main');
  checkNotifPermission();
  fetchWeather();
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchWeather, 600000);
}

function changeRegion(){
  if(refreshTimer) clearInterval(refreshTimer);
  show('screen-select');
}

async function fetchWeather(){
  if(!currentRegion) return;
  const {nx, ny} = REGIONS[currentRegion];
  try{
    const res  = await fetch(`/api/weather?nx=${nx}&ny=${ny}`);
    const data = await res.json();
    const obs  = {};
    data.response.body.items.item.forEach(i => obs[i.category] = i.obsrValue);
    const pty    = parseInt(obs.PTY || 0);
    const rn1    = obs.RN1 === '강수없음' ? 0 : parseFloat(obs.RN1 || 0);
    const temp   = parseFloat(obs.T1H || 0);
    const humid  = parseFloat(obs.REH || 0);
    const wind   = parseFloat(obs.WSD || 0);
    const isRain = RAIN_PTY.has(pty) || rn1 > 0;
    const surge  = isRain || temp <= -5 || temp >= 33;
    updateUI({pty, rn1, temp, humid, wind, isRain, surge});
  }catch(e){
    document.getElementById('status-main').textContent = '데이터 오류';
    document.getElementById('status-sub').textContent  = e.message.slice(0,40);
  }
}

function updateUI({pty, rn1, temp, humid, wind, isRain, surge}){
  const card    = document.getElementById('status-card');
  const icon    = document.getElementById('status-icon');
  const main    = document.getElementById('status-main');
  const sub     = document.getElementById('status-sub');
  const changed = document.getElementById('status-changed');

  // 상태 변화 감지 → 알림
  if(lastSurcharge !== null && lastSurcharge !== surge){
    const now = new Date();
    lastChangeTime = now;
    const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    changed.textContent = surge ? `${timeStr} 비 시작` : `${timeStr} 비 그침`;
    changed.style.display = 'block';
    sendNotification(surge, currentRegion);
  }
  lastSurcharge = surge;

  card.className = 'status-card ' + (surge ? 'on' : 'off');

  if(surge && isRain){
    icon.textContent  = '⚠️';
    main.textContent  = '기상할증 ON 권장';
    sub.textContent   = `비가 내리고 있어요 · ${rn1 > 0 ? rn1+'mm/h' : PTY_LABEL[pty]}`;
  } else if(surge){
    icon.textContent  = '⚠️';
    main.textContent  = '기상할증 ON 권장';
    sub.textContent   = temp <= -5 ? `한파 (${temp}°C)` : `폭염 (${temp}°C)`;
  } else {
    icon.textContent  = '✅';
    main.textContent  = '기상할증 OFF';
    sub.textContent   = '현재 강수 없음 · 할증 불필요';
  }

  document.getElementById('n-temp').textContent   = `${Math.round(temp*10)/10}°`;
  document.getElementById('n-precip').textContent = rn1 > 0 ? `${Math.round(rn1*10)/10}mm` : '0mm';
  document.getElementById('n-humid').textContent  = `${Math.round(humid)}%`;

  const now = new Date();
  document.getElementById('m-footer').textContent =
    `기상청 초단기실황 · ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 업데이트`;
}

// ── 브라우저 알림 ──────────────────────────────────────────
function checkNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    document.getElementById('notif-banner').style.display = 'flex';
  }
}

async function requestNotif(){
  const perm = await Notification.requestPermission();
  document.getElementById('notif-banner').style.display = 'none';
  if(perm === 'granted'){
    new Notification('알림 설정 완료!', {
      body: `${currentRegion} 기상 변화 시 알림을 드릴게요.`,
      icon: '/manifest.json'
    });
  }
}

function sendNotification(surge, region){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  if(surge){
    new Notification(`☔ ${region} — 비 시작`, {
      body: '기상할증 ON을 권장해요.',
      icon: '/manifest.json',
      tag: 'weather-alert',
      requireInteraction: true
    });
  } else {
    new Notification(`☀️ ${region} — 비 그침`, {
      body: '기상할증 OFF를 검토해주세요.',
      icon: '/manifest.json',
      tag: 'weather-alert'
    });
  }
}

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

buildRegionList();
const saved = localStorage.getItem('vroong_region');
if(saved && REGIONS[saved]){ selectRegion(saved); }
else { show('screen-select'); }
</script>
</body>
</html>
